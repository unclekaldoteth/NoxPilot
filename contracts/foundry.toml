[profile.default]
src = "src"
script = "script"
out = "out"
libs = ["../node_modules"]
remappings = [
  "@iexec-nox/nox-confidential-contracts/=../node_modules/@iexec-nox/nox-confidential-contracts/",
  "@iexec-nox/nox-protocol-contracts/=../node_modules/@iexec-nox/nox-protocol-contracts/",
  "@openzeppelin/contracts/=../node_modules/@openzeppelin/contracts/",
  "encrypted-types/=../node_modules/encrypted-types/"
]
# Pin a portable compiler version so CI/Railway runners do not depend on a
# machine-local solc path such as /opt/homebrew/bin/solc.
auto_detect_solc = false
solc = "0.8.33"
optimizer = true
optimizer_runs = 200
via_ir = true

[lint]
lint_on_build = false
