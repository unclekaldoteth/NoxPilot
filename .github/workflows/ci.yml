name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Install agent dependencies
        run: python -m pip install -r apps/agent/requirements.txt

      - name: Secret scan
        run: |
          if git grep -nE 'PRIVATE_KEY=0x[0-9a-fA-F]{64}|CHAINGPT_API_KEY=(sk-|cgpt_|[A-Za-z0-9_\-]{32,})|WALLETCONNECT_PROJECT_ID=[A-Za-z0-9_\-]{20,}' -- ':(exclude)*.example' ':(exclude)pnpm-lock.yaml'; then
            echo "Potential private credential found. Move it to local env or GitHub secrets."
            exit 1
          fi

      - name: Validate repo
        run: pnpm validate
